<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILGAZMOD Launcher</title>
    <style>
        /* Sistem Tema Ayarları */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --btn-blue: #0000FF;
            --card-bg: #f4f4f4;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #ffffff;
                --card-bg: #1e1e1e;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            transition: all 0.3s ease;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        p.subtitle { font-size: 1.2rem; opacity: 0.8; margin-bottom: 30px; }

        .download-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }

        .firefox-badge {
            width: 250px;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .firefox-badge:hover {
            transform: scale(1.05);
        }

        .preview-img {
            max-width: 100%;
            width: 700px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin: 40px 0;
        }

        .info-box {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
            border: 2px solid var(--btn-blue);
        }

        .back-btn {
            display: block;
            margin-top: 50px;
            color: var(--btn-blue);
            text-decoration: underline;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <h1>ILGAZMOD Launcher</h1>
    <p class="subtitle">Scratch projelerini ILGAZMOD ile tek tıkla açın!</p>

    <div class="download-container">
        <a href="https://addons.mozilla.org/en-US/firefox/addon/ilgaz-mod-launcher/" target="_blank">
            <img src="GetonFirefoxADDON.png" alt="Firefox'tan Edin" class="firefox-badge">
        </a>
    </div>

    <br>
    <img src="resim.png" alt="ILGAZMOD Launcher Önizleme" class="preview-img">

    <div class="info-box">
        <h2>ILGAZMOD launcher nedir?</h2>
        <p>ILGAZMOD launcher, Scratch projeleri ILGAZMOD ile açabilirsiniz. ⚡'ya tıklayarak scratch projeleri ILGAZMOD ile açabilirsiniz! Eklenti sadece firefox add-on'da vardır</p>
    </div>

    <a href="https://ilgazmod.vercel.app" class="back-btn">ILGAZMOD'a geri dön</a>

</body>
</html>
